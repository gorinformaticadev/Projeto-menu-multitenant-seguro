# version: '3.8'

# ============================================================================
# Docker Compose para uso com Nginx EXTERNO (fora do Docker)
# ============================================================================
# Este arquivo é usado quando você tem Nginx instalado no host
# e quer que os containers exponham portas apenas no localhost
# ============================================================================

services:
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      # Expõe apenas no localhost para o Nginx do host acessar
      - "127.0.0.1:5000:5000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000}

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      # Expõe apenas no localhost para o Nginx do host acessar
      - "127.0.0.1:4000:4000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5000}
      - SEED_ON_START=${SEED_ON_START:-true}
      - SEED_FORCE=${SEED_FORCE:-false}
      - SEED_LOCK_ID=${SEED_LOCK_ID:-87456321}
      - SEED_LOCK_WAIT_SECONDS=${SEED_LOCK_WAIT_SECONDS:-90}
      - SEED_LOCK_RETRY_MS=${SEED_LOCK_RETRY_MS:-2000}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - multitenant-network
    volumes:
      - backups:/app/apps/backend/backups

  db:
    environment:
      - POSTGRES_DB=multitenant
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    networks:
      - multitenant-network

  redis:
    networks:
      - multitenant-network

networks:
  multitenant-network:
    driver: bridge

volumes:
  backups:
    driver: local
