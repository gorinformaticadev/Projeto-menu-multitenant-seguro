services:
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        APP_VERSION: ${APP_VERSION:-latest}
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-latest}
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
