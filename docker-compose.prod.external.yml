services:
  frontend:
    image: ${DOCKERHUB_USERNAME:-local}/multitenant-frontend:${RELEASE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://${DOMAIN:-localhost}/api
        - APP_VERSION=${APP_VERSION:-latest}
        - GIT_SHA=${GIT_SHA:-unknown}
        - BUILD_TIME=${BUILD_TIME:-unknown}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://${DOMAIN:-localhost}/api
      - APP_VERSION=${APP_VERSION:-latest}
      - GIT_SHA=${GIT_SHA:-unknown}
      - BUILD_TIME=${BUILD_TIME:-unknown}
      - PORT=5000
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    image: ${DOCKERHUB_USERNAME:-local}/multitenant-backend:${RELEASE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      args:
        - APP_VERSION=${APP_VERSION:-latest}
        - GIT_SHA=${GIT_SHA:-unknown}
        - BUILD_TIME=${BUILD_TIME:-unknown}
    restart: unless-stopped
    environment:
      - APP_VERSION=${APP_VERSION:-latest}
      - GIT_SHA=${GIT_SHA:-unknown}
      - BUILD_TIME=${BUILD_TIME:-unknown}
      - DATABASE_URL=${DATABASE_URL:-postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-multitenant}}
      - BACKUP_ADMIN_DATABASE_URL=${BACKUP_ADMIN_DATABASE_URL:-}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET not set}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY not set}
      - FRONTEND_URL=https://${DOMAIN:-localhost}
      - NODE_ENV=production
      - PORT=4000
      - SEED_ON_START=${SEED_ON_START:-true}
      - SEED_FORCE=${SEED_FORCE:-false}
      - SEED_LOCK_ID=${SEED_LOCK_ID:-87456321}
      - SEED_LOCK_WAIT_SECONDS=${SEED_LOCK_WAIT_SECONDS:-90}
      - SEED_LOCK_RETRY_MS=${SEED_LOCK_RETRY_MS:-2000}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./uploads:/app/uploads
      - backups:/app/apps/backend/backups
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-${DB_USER:-postgres}}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-${DB_PASSWORD:-postgres}}
      - POSTGRES_DB=${POSTGRES_DB:-${DB_NAME:-multitenant}}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-${DB_USER:-postgres}}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data_prod:/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_prod:
  redis_data_prod:
  backups:


networks:
  app-network:
    name: app-network
    driver: bridge
