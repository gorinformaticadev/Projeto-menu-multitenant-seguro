services:
  frontend:
    image: ${DOCKERHUB_USERNAME:-local}/multitenant-frontend:${RELEASE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://${DOMAIN:-localhost}/api
        - APP_VERSION=${APP_VERSION:-latest}
        - GIT_SHA=${GIT_SHA:-unknown}
        - BUILD_TIME=${BUILD_TIME:-unknown}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://${DOMAIN:-localhost}/api
      - PORT=5000
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    image: ${DOCKERHUB_USERNAME:-local}/multitenant-backend:${RELEASE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      args:
        - APP_VERSION=${APP_VERSION:-latest}
        - GIT_SHA=${GIT_SHA:-unknown}
        - BUILD_TIME=${BUILD_TIME:-unknown}
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-multitenant}}
      - BACKUP_ADMIN_DATABASE_URL=${BACKUP_ADMIN_DATABASE_URL:-}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET not set}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY not set}
      - FRONTEND_URL=https://${DOMAIN:-localhost}
      - NODE_ENV=production
      - PORT=4000
      - SEED_ON_START=${SEED_ON_START:-true}
      - SEED_FORCE=${SEED_FORCE:-false}
      - SEED_LOCK_ID=${SEED_LOCK_ID:-87456321}
      - SEED_LOCK_WAIT_SECONDS=${SEED_LOCK_WAIT_SECONDS:-90}
      - SEED_LOCK_RETRY_MS=${SEED_LOCK_RETRY_MS:-2000}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - UPLOADS_DIR=/app/uploads
      - BACKUP_DIR=/app/backups
    volumes:
      - uploads_prod:/app/uploads
      - backups_prod:/app/backups
    networks:
      - multitenant-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:4000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:
    image: postgres:15
    container_name: multitenant-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME:-multitenant}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - multitenant-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-multitenant}" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: multitenant-redis
    restart: unless-stopped
    command: sh -c 'redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"'
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redis_data_prod:/data
    networks:
      - multitenant-network
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_prod:
  redis_data_prod:
  uploads:
  backups:


networks:
  app-network:
    name: app-network
    driver: bridge
