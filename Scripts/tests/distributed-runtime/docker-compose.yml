services:
  postgres:
    image: postgres:15-alpine
    container_name: codex-distributed-postgres
    environment:
      POSTGRES_DB: runtimeproof
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d runtimeproof"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: codex-distributed-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.12.0
    container_name: codex-distributed-toxiproxy
    command: ["-host=0.0.0.0"]
    ports:
      - "8474:8474"
      - "46379:46379"
      - "46460:46460"
