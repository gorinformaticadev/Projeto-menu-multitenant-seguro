name: CI/CD Pipeline

on:
  push:
    branches: ["main", "develop"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Run Tests & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: |
          pnpm --filter backend run --if-present lint
          pnpm --filter frontend run --if-present lint

      - name: Backend Tests
        run: pnpm --filter backend run --if-present test

      - name: Build Check
        run: |
          pnpm --filter backend build
          pnpm --filter frontend build

  build-and-push:
    name: Build & Push Docker Images
    needs: test
    if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve build metadata
        id: meta-vars
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(grep -m1 '"version"' apps/backend/package.json | sed -E 's/.*"version"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/')"
          fi
          build_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "app_version=${version}" >> "$GITHUB_OUTPUT"
          echo "git_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "build_time=${build_time}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: Docker metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-frontend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: Validate backend image has Prisma Client
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --target runner \
            --file ./apps/backend/Dockerfile \
            --build-arg APP_VERSION=${{ steps.meta-vars.outputs.app_version }} \
            --build-arg GIT_SHA=${{ steps.meta-vars.outputs.git_sha }} \
            --build-arg BUILD_TIME=${{ steps.meta-vars.outputs.build_time }} \
            --load \
            --tag backend-prisma-check:ci \
            .
          docker run --rm --entrypoint node backend-prisma-check:ci -e "process.chdir('/app/apps/backend'); require('@prisma/client'); console.log('Prisma Client OK')"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/backend/Dockerfile
          build-args: |
            APP_VERSION=${{ steps.meta-vars.outputs.app_version }}
            GIT_SHA=${{ steps.meta-vars.outputs.git_sha }}
            BUILD_TIME=${{ steps.meta-vars.outputs.build_time }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/frontend/Dockerfile
          build-args: |
            NEXT_PUBLIC_API_URL=/api
            APP_VERSION=${{ steps.meta-vars.outputs.app_version }}
            GIT_SHA=${{ steps.meta-vars.outputs.git_sha }}
            BUILD_TIME=${{ steps.meta-vars.outputs.build_time }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
