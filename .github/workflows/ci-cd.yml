name: CI/CD Pipeline

on:
  push:
    branches: ["main", "develop"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io

jobs:
  backend-build:
    name: backend-build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_db?schema=public
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm -C apps/backend run prisma:generate

      - name: Backend build
        run: pnpm -C apps/backend build

      - name: Backend tests
        run: pnpm -C apps/backend run --if-present test

      - name: Backend security guardrails
        run: pnpm -C apps/backend run --if-present security:guardrails

      - name: Backend security regression tests
        run: pnpm -C apps/backend run --if-present test:security-regression

      - name: Backend lint
        run: pnpm -C apps/backend run --if-present lint

  frontend-build:
    name: frontend-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend theming guard
        run: pnpm check:theming

      - name: Frontend build
        run: pnpm -C apps/frontend build

      - name: Frontend lint
        run: pnpm -C apps/frontend run --if-present lint

  scripts-check:
    name: scripts-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck --version

      - name: Validate critical scripts
        shell: bash
        run: |
          set -euo pipefail

          syntax_scripts=(
            "install/install.sh"
            "install/update.sh"
            "install/update-native.sh"
            "install/rollback-native.sh"
            "install/release-retention.sh"
            "install/restore-native.sh"
            "install/restore-db.sh"
            "install/update-images.sh"
            "install-2/utils/native-utils.sh"
            "install-2/utils/docker-install.sh"
            "Scripts/migrate-uploads.sh"
          )

          for script in "${syntax_scripts[@]}"; do
            if [[ ! -f "$script" ]]; then
              echo "Script obrigatorio nao encontrado: $script"
              exit 1
            fi
            chmod +x "$script"
            bash -n "$script"
          done

          shellcheck_scripts=(
            "install/update-native.sh"
            "install/rollback-native.sh"
            "install/release-retention.sh"
            "install/restore-native.sh"
            "install/restore-db.sh"
            "install/update-images.sh"
            "Scripts/migrate-uploads.sh"
          )

          shellcheck -x -e SC1090,SC1091 "${shellcheck_scripts[@]}"

      - name: Installer redis auth regression guard
        run: node Scripts/tests/installer-redis-auth-regression.js

  smoke-tests:
    name: smoke-tests
    needs: [backend-build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm -C apps/backend run prisma:generate

      - name: Run smoke contract tests
        run: pnpm -C apps/backend run test:smoke

  build-and-push:
    name: Build & Push Docker Images
    needs: [backend-build, frontend-build, scripts-check, smoke-tests]
    if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve build metadata
        id: meta-vars
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            short_sha="${GITHUB_SHA::7}"
            version="dev+${short_sha}"
          fi
          build_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          branch_name="${GITHUB_REF_NAME}"
          printf '%s\n' "$version" > VERSION
          printf '{\n  "version": "%s",\n  "commitSha": "%s",\n  "buildDate": "%s",\n  "branch": "%s"\n}\n' \
            "$version" "$GITHUB_SHA" "$build_time" "$branch_name" > BUILD_INFO.json
          echo "app_version=${version}" >> "$GITHUB_OUTPUT"
          echo "git_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "build_time=${build_time}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: Docker metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-frontend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: Validate backend image has Prisma Client
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --target runner \
            --file ./apps/backend/Dockerfile \
            --build-arg APP_VERSION=${{ steps.meta-vars.outputs.app_version }} \
            --build-arg GIT_SHA=${{ steps.meta-vars.outputs.git_sha }} \
            --build-arg BUILD_TIME=${{ steps.meta-vars.outputs.build_time }} \
            --load \
            --tag backend-prisma-check:ci \
            .
          docker run --rm --entrypoint node backend-prisma-check:ci -e "process.chdir('/app/apps/backend'); require('@prisma/client'); console.log('Prisma Client OK')"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/backend/Dockerfile
          build-args: |
            APP_VERSION=${{ steps.meta-vars.outputs.app_version }}
            GIT_SHA=${{ steps.meta-vars.outputs.git_sha }}
            BUILD_TIME=${{ steps.meta-vars.outputs.build_time }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/frontend/Dockerfile
          build-args: |
            NEXT_PUBLIC_API_URL=/api
            APP_VERSION=${{ steps.meta-vars.outputs.app_version }}
            GIT_SHA=${{ steps.meta-vars.outputs.git_sha }}
            BUILD_TIME=${{ steps.meta-vars.outputs.build_time }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
